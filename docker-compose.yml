services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ichackerthon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ichackerthon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ichackerthon"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
