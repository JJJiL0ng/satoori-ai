<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Style B — Neon Cyber</title>
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@400,500,700&display=swap" />
<style>
/* === MANDATORY VIEWPORT BASE === */
html,body{height:100%;overflow-x:hidden}
html{scroll-snap-type:y mandatory;scroll-behavior:smooth}
.slide{width:100vw;height:100vh;height:100dvh;overflow:hidden;scroll-snap-align:start;display:flex;flex-direction:column;position:relative}
.slide-content{flex:1;display:flex;flex-direction:column;justify-content:center;max-height:100%;overflow:hidden;padding:var(--slide-padding)}
:root{
  --title-size:clamp(1.5rem,5vw,4rem);
  --h2-size:clamp(1.25rem,3.5vw,2.5rem);
  --h3-size:clamp(1rem,2.5vw,1.75rem);
  --body-size:clamp(0.75rem,1.5vw,1.125rem);
  --small-size:clamp(0.65rem,1vw,0.875rem);
  --slide-padding:clamp(1rem,4vw,4rem);
  --content-gap:clamp(0.5rem,2vw,2rem);
  --element-gap:clamp(0.25rem,1vw,1rem);
}
img{max-width:100%;max-height:min(50vh,400px);object-fit:contain}
@media (max-height:700px){:root{--slide-padding:clamp(0.75rem,3vw,2rem);--title-size:clamp(1.25rem,4.5vw,2.5rem)}}
@media (max-height:600px){:root{--slide-padding:clamp(0.5rem,2.5vw,1.5rem);--title-size:clamp(1.1rem,4vw,2rem)}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.2s!important}html{scroll-behavior:auto}}

/* === STYLE B: NEON CYBER === */
:root{
  --bg-navy:#0a0f1c;
  --bg-deep:#050810;
  --cyan:#00ffcc;
  --magenta:#ff00aa;
  --text-light:#e8eef8;
  --text-dim:#7a8aa6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Satoshi',system-ui,sans-serif;
  background:var(--bg-deep);
  color:var(--text-light);
  -webkit-font-smoothing:antialiased;
}

.slide{
  background:
    radial-gradient(ellipse at 18% 75%,rgba(255,0,170,.18) 0%,transparent 55%),
    radial-gradient(ellipse at 82% 22%,rgba(0,255,204,.16) 0%,transparent 55%),
    var(--bg-navy);
  padding:var(--slide-padding);
  display:grid;grid-template-rows:auto 1fr auto;
  gap:clamp(.8rem,2vh,1.6rem);
}

/* Background grid */
.slide::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,255,204,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,204,.05) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse at 50% 50%,#000 20%,transparent 75%);
}

/* Particle dots */
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.particles span{
  position:absolute;width:4px;height:4px;border-radius:50%;
  background:var(--cyan);box-shadow:0 0 8px var(--cyan);
  animation:float 6s ease-in-out infinite;opacity:.55;
}
.particles span:nth-child(1){top:18%;left:12%;animation-delay:0s}
.particles span:nth-child(2){top:30%;left:88%;background:var(--magenta);box-shadow:0 0 10px var(--magenta);animation-delay:1.2s}
.particles span:nth-child(3){top:65%;left:18%;animation-delay:2.1s}
.particles span:nth-child(4){top:78%;left:72%;background:var(--magenta);box-shadow:0 0 10px var(--magenta);animation-delay:.6s}
.particles span:nth-child(5){top:42%;left:46%;animation-delay:3s}
.particles span:nth-child(6){top:88%;left:38%;animation-delay:1.8s}
@keyframes float{0%,100%{transform:translateY(0);opacity:.55}50%{transform:translateY(-22px);opacity:1}}

/* Topbar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:2;
  font-family:'Satoshi',sans-serif;font-size:var(--small-size);
  letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);
}
.brand{display:flex;align-items:center;gap:.7rem;color:var(--text-light)}
.brand-mark{
  width:1.1rem;height:1.1rem;border:1.5px solid var(--cyan);border-radius:50%;
  position:relative;
}
.brand-mark::after{content:"";position:absolute;inset:25%;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.status{display:flex;align-items:center;gap:.45rem}
.status .live{width:.5rem;height:.5rem;background:var(--magenta);border-radius:50%;box-shadow:0 0 8px var(--magenta);animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

/* Center hero */
.hero{
  display:flex;flex-direction:column;justify-content:center;
  position:relative;z-index:2;gap:clamp(.7rem,1.8vh,1.4rem);
  max-width:min(960px,90vw);
}
.kicker{
  display:inline-flex;align-items:center;gap:.7rem;
  font-family:'Satoshi',sans-serif;font-size:var(--small-size);
  letter-spacing:.32em;text-transform:uppercase;color:var(--cyan);
  align-self:flex-start;
}
.kicker .bar{width:2rem;height:1px;background:var(--cyan);box-shadow:0 0 6px var(--cyan)}

.title{
  font-family:'Clash Display',sans-serif;font-weight:700;
  font-size:clamp(2.6rem,8vw,6.4rem);
  line-height:.92;letter-spacing:-.02em;
  color:var(--text-light);
}
.title .glow{
  background:linear-gradient(120deg,var(--cyan) 0%,var(--text-light) 40%,var(--magenta) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 24px rgba(0,255,204,.25));
}
.title .sub{
  display:block;font-family:'Satoshi',sans-serif;font-weight:500;
  font-size:clamp(1rem,2vw,1.4rem);
  letter-spacing:.04em;color:var(--text-dim);margin-top:.6rem;
}

.tagline{
  font-family:'Satoshi',sans-serif;font-size:var(--body-size);
  line-height:1.55;color:var(--text-light);max-width:54ch;opacity:.9;
}
.tagline strong{color:var(--cyan);font-weight:700}

/* CTA / chips */
.chips{display:flex;flex-wrap:wrap;gap:.55rem;margin-top:.4rem}
.chip{
  border:1px solid rgba(0,255,204,.4);
  border-radius:999px;padding:.4rem .85rem;
  font-family:'Satoshi',sans-serif;font-size:var(--small-size);
  letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);
  background:rgba(0,255,204,.05);
}
.chip.alt{border-color:rgba(255,0,170,.45);background:rgba(255,0,170,.06);color:#ffd5ee}

/* Bottom meta */
.bottombar{
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:2;
  font-family:'Satoshi',sans-serif;font-size:var(--small-size);
  color:var(--text-dim);letter-spacing:.16em;text-transform:uppercase;
}
.bottombar .num{color:var(--cyan);font-family:'Clash Display',sans-serif;font-weight:600;font-size:clamp(.9rem,1.4vw,1.1rem)}

/* Entrance */
@keyframes rise{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
.reveal{opacity:0;animation:rise .75s cubic-bezier(.2,.7,.2,1) forwards}
.d1{animation-delay:.05s}.d2{animation-delay:.2s}.d3{animation-delay:.36s}
.d4{animation-delay:.5s}.d5{animation-delay:.62s}.d6{animation-delay:.76s}
</style>
</head>
<body>
<section class="slide">
  <div class="particles" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="topbar reveal d1">
    <div class="brand"><span class="brand-mark"></span><span>속마음 번역기 · v0.1</span></div>
    <div class="status"><span class="live"></span><span>LIVE · GEMINI 2.5 FLASH</span></div>
  </div>

  <div class="hero">
    <span class="kicker reveal d2"><span class="bar"></span>HACKERTHON PITCH · KOREAN DIALECT NLP</span>
    <h1 class="title reveal d3">
      <span class="glow">속마음</span> 번역기
      <span class="sub">사투리 ↔ 표준어 + 그 안에 숨은 진짜 마음.</span>
    </h1>
    <p class="tagline reveal d4">
      “밥은 묵었나?” 같은 무뚝뚝한 한 마디 뒤의 <strong>걱정·고마움·미안함</strong>을
      AI가 해석해서 보여줍니다. 가족 사이의 거리는 멀어도, 마음은 옮길 수 있게.
    </p>
    <div class="chips reveal d5">
      <span class="chip">▸ Bidirectional</span>
      <span class="chip">▸ Emotion + Tip</span>
      <span class="chip alt">▸ Context Memory</span>
    </div>
  </div>

  <div class="bottombar reveal d6">
    <span>STYLE B · NEON CYBER</span>
    <span><span class="num">01</span> / 12 · ICHACKERTHON 2026</span>
  </div>
</section>
</body>
</html>
