<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Style C — Split Pastel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
/* === MANDATORY VIEWPORT BASE === */
html,body{height:100%;overflow-x:hidden}
html{scroll-snap-type:y mandatory;scroll-behavior:smooth}
.slide{width:100vw;height:100vh;height:100dvh;overflow:hidden;scroll-snap-align:start;display:flex;flex-direction:column;position:relative}
.slide-content{flex:1;display:flex;flex-direction:column;justify-content:center;max-height:100%;overflow:hidden;padding:var(--slide-padding)}
:root{
  --title-size:clamp(1.5rem,5vw,4rem);
  --h2-size:clamp(1.25rem,3.5vw,2.5rem);
  --h3-size:clamp(1rem,2.5vw,1.75rem);
  --body-size:clamp(0.75rem,1.5vw,1.125rem);
  --small-size:clamp(0.65rem,1vw,0.875rem);
  --slide-padding:clamp(1rem,4vw,4rem);
  --content-gap:clamp(0.5rem,2vw,2rem);
  --element-gap:clamp(0.25rem,1vw,1rem);
}
img{max-width:100%;max-height:min(50vh,400px);object-fit:contain}
@media (max-height:700px){:root{--slide-padding:clamp(0.75rem,3vw,2rem);--title-size:clamp(1.25rem,4.5vw,2.5rem)}}
@media (max-height:600px){:root{--slide-padding:clamp(0.5rem,2.5vw,1.5rem);--title-size:clamp(1.1rem,4vw,2rem)}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.2s!important}html{scroll-behavior:auto}}

/* === STYLE C: SPLIT PASTEL === */
:root{
  --bg-peach:#f5e6dc;
  --bg-lavender:#e4dff0;
  --text-dark:#1a1a1a;
  --text-soft:#4a4453;
  --badge-mint:#c8f0d8;
  --badge-yellow:#f6efb6;
  --badge-pink:#f0d4e0;
  --accent-coral:#e87b6f;
  --accent-violet:#7c6aad;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg-peach);color:var(--text-dark);-webkit-font-smoothing:antialiased}

.slide{
  display:grid;grid-template-columns:1fr 1fr;
  background:linear-gradient(90deg,var(--bg-peach) 50%,var(--bg-lavender) 50%);
}

/* Soft circle accents */
.slide::before{
  content:"";position:absolute;
  width:32vw;height:32vw;max-width:480px;max-height:480px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(232,123,111,.35),transparent 70%);
  top:-8vw;left:-6vw;filter:blur(8px);pointer-events:none;
}
.slide::after{
  content:"";position:absolute;
  width:28vw;height:28vw;max-width:420px;max-height:420px;
  border-radius:50%;
  background:radial-gradient(circle at 70% 70%,rgba(124,106,173,.28),transparent 70%);
  bottom:-6vw;right:-4vw;filter:blur(6px);pointer-events:none;
}

.panel{
  position:relative;z-index:1;
  padding:var(--slide-padding);
  display:flex;flex-direction:column;justify-content:space-between;
}
.panel-right{
  background-image:
    linear-gradient(rgba(124,106,173,.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(124,106,173,.07) 1px,transparent 1px);
  background-size:32px 32px;
}

.brand{
  display:flex;align-items:center;gap:.6rem;
  font-family:'Outfit',sans-serif;font-weight:500;
  font-size:var(--small-size);letter-spacing:.18em;text-transform:uppercase;
  color:var(--text-soft);
}
.brand .dot{width:.55rem;height:.55rem;background:var(--accent-coral);border-radius:50%}

.kicker{
  display:inline-flex;align-items:center;gap:.5rem;align-self:flex-start;
  background:#fff;border-radius:999px;padding:.45rem .9rem;
  font-size:var(--small-size);font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--accent-violet);
  box-shadow:0 1px 0 rgba(0,0,0,.04);
}
.kicker .pulse{width:.45rem;height:.45rem;background:var(--accent-violet);border-radius:50%}

.title{
  font-family:'Outfit',sans-serif;font-weight:800;
  font-size:clamp(2.6rem,7vw,5.2rem);line-height:.95;
  letter-spacing:-.02em;color:var(--text-dark);
}
.title .accent{color:var(--accent-coral);font-style:italic;font-weight:700}
.title .underline{
  display:inline-block;position:relative;
}
.title .underline::after{
  content:"";position:absolute;left:-2%;right:-2%;bottom:.05em;
  height:.32em;background:var(--badge-yellow);z-index:-1;border-radius:4px;
}

.tagline{
  font-family:'Outfit',sans-serif;font-weight:400;
  font-size:var(--body-size);line-height:1.55;
  color:var(--text-soft);max-width:32ch;
}

.badges{display:flex;flex-wrap:wrap;gap:.55rem;margin-top:.4rem}
.badge{
  display:inline-flex;align-items:center;gap:.4rem;
  border-radius:999px;padding:.4rem .85rem;
  font-size:var(--small-size);font-weight:600;color:var(--text-dark);
}
.b-mint{background:var(--badge-mint)}
.b-yellow{background:var(--badge-yellow)}
.b-pink{background:var(--badge-pink)}

/* Right card: demo */
.demo-card{
  background:#fff;border-radius:20px;padding:1.4rem 1.5rem;
  box-shadow:0 12px 32px rgba(124,106,173,.12),0 1px 0 rgba(0,0,0,.03);
  display:flex;flex-direction:column;gap:.75rem;
  max-width:min(420px,90%);align-self:flex-end;width:100%;
}
.demo-row{display:flex;align-items:flex-start;gap:.7rem}
.bubble{
  background:#f4eee8;border-radius:14px 14px 14px 4px;
  padding:.6rem .85rem;font-weight:600;color:var(--text-dark);
  font-size:var(--body-size);
}
.bubble.you{background:var(--accent-coral);color:#fff;border-radius:14px 14px 4px 14px;margin-left:auto}
.divider{border:0;border-top:1px dashed rgba(124,106,173,.35);margin:.3rem 0}
.real{
  font-family:'Outfit',sans-serif;font-weight:500;font-style:italic;
  color:var(--accent-violet);font-size:var(--body-size);line-height:1.45;
}
.real .label{
  display:inline-block;background:var(--badge-pink);color:var(--text-dark);
  font-style:normal;font-weight:700;font-size:.7rem;padding:.15rem .5rem;border-radius:999px;
  margin-right:.4rem;letter-spacing:.06em;text-transform:uppercase;
}

.meta{
  display:flex;align-items:center;justify-content:space-between;
  font-size:var(--small-size);letter-spacing:.14em;text-transform:uppercase;
  color:var(--text-soft);font-weight:500;
}
.meta .num{font-weight:800;color:var(--accent-violet);font-size:1rem;letter-spacing:.04em}

/* Entrance */
@keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.reveal{opacity:0;animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards}
.reveal-pop{opacity:0;animation:pop .65s cubic-bezier(.18,.9,.32,1.2) forwards}
.d1{animation-delay:.05s}.d2{animation-delay:.18s}.d3{animation-delay:.32s}
.d4{animation-delay:.46s}.d5{animation-delay:.6s}.d6{animation-delay:.74s}

/* Narrow viewport: stack */
@media (max-width:780px){
  .slide{grid-template-columns:1fr;grid-template-rows:55% 45%;background:linear-gradient(180deg,var(--bg-peach) 55%,var(--bg-lavender) 55%)}
  .demo-card{align-self:center}
}
</style>
</head>
<body>
<section class="slide">
  <!-- LEFT: PEACH -->
  <div class="panel panel-left">
    <div class="brand reveal d1"><span class="dot"></span><span>속마음 번역기 · 2026</span></div>

    <div style="display:flex;flex-direction:column;gap:1.1rem">
      <span class="kicker reveal d2"><span class="pulse"></span>Hackerthon Pitch</span>
      <h1 class="title reveal d3">
        말로 못한<br/>
        <span class="underline">마음을</span>
        <span class="accent">옮기다</span>
      </h1>
      <p class="tagline reveal d4">사투리 한 줄에 담긴 걱정·고마움·미안함을 AI가 해석합니다. 가족 사이의 거리를 좁히는 가장 짧은 다리.</p>
    </div>

    <div class="badges reveal d5">
      <span class="badge b-mint">♥ 양방향 번역</span>
      <span class="badge b-yellow">✦ 속마음 해석</span>
      <span class="badge b-pink">↻ 대화 기억</span>
    </div>
  </div>

  <!-- RIGHT: LAVENDER -->
  <div class="panel panel-right">
    <div class="brand reveal d2" style="justify-content:flex-end">
      <span>STYLE C · SPLIT PASTEL</span>
    </div>

    <div class="demo-card reveal-pop d4">
      <div class="demo-row">
        <span class="bubble you">밥은 묵었나?</span>
      </div>
      <div class="demo-row">
        <span class="bubble">→ 밥 먹었어?</span>
      </div>
      <hr class="divider" />
      <p class="real">
        <span class="label">속마음</span>
        잘 지내는지 걱정돼서, 보고 싶다는 뜻이야.
      </p>
    </div>

    <div class="meta reveal d6">
      <span>NEXT.JS · GEMINI · POSTGRES</span>
      <span><span class="num">01</span> / 12</span>
    </div>
  </div>
</section>
</body>
</html>
