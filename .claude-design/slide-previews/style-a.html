<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Style A — Creative Voltage</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
/* === MANDATORY VIEWPORT BASE (from viewport-base.css) === */
html,body{height:100%;overflow-x:hidden}
html{scroll-snap-type:y mandatory;scroll-behavior:smooth}
.slide{width:100vw;height:100vh;height:100dvh;overflow:hidden;scroll-snap-align:start;display:flex;flex-direction:column;position:relative}
.slide-content{flex:1;display:flex;flex-direction:column;justify-content:center;max-height:100%;overflow:hidden;padding:var(--slide-padding)}
:root{
  --title-size:clamp(1.5rem,5vw,4rem);
  --h2-size:clamp(1.25rem,3.5vw,2.5rem);
  --h3-size:clamp(1rem,2.5vw,1.75rem);
  --body-size:clamp(0.75rem,1.5vw,1.125rem);
  --small-size:clamp(0.65rem,1vw,0.875rem);
  --slide-padding:clamp(1rem,4vw,4rem);
  --content-gap:clamp(0.5rem,2vw,2rem);
  --element-gap:clamp(0.25rem,1vw,1rem);
}
img,.image-container{max-width:100%;max-height:min(50vh,400px);object-fit:contain}
@media (max-height:700px){:root{--slide-padding:clamp(0.75rem,3vw,2rem);--title-size:clamp(1.25rem,4.5vw,2.5rem);--h2-size:clamp(1rem,3vw,1.75rem)}}
@media (max-height:600px){:root{--slide-padding:clamp(0.5rem,2.5vw,1.5rem);--title-size:clamp(1.1rem,4vw,2rem)}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.2s!important}html{scroll-behavior:auto}}

/* === STYLE A: CREATIVE VOLTAGE === */
:root{
  --bg-primary:#0066ff;
  --bg-dark:#1a1a2e;
  --accent-neon:#d4ff00;
  --text-light:#ffffff;
  --ink:#0a0a14;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Mono',ui-monospace,monospace;background:var(--bg-dark);color:var(--text-light)}

/* Split panel: electric blue left, dark right */
.slide{display:grid;grid-template-columns:55% 45%;background:var(--bg-dark)}
.panel-left{
  background:var(--bg-primary);
  position:relative;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:var(--slide-padding);
  overflow:hidden;
}
/* Halftone dot texture */
.panel-left::before{
  content:"";position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,.18) 1.4px,transparent 1.5px);
  background-size:18px 18px;
  mask-image:linear-gradient(135deg,#000 30%,transparent 80%);
  pointer-events:none;
}
.panel-right{
  position:relative;
  padding:var(--slide-padding);
  display:flex;flex-direction:column;justify-content:space-between;
  background:
    radial-gradient(ellipse at 80% 20%,rgba(212,255,0,.12) 0%,transparent 60%),
    var(--bg-dark);
}
.grid-overlay{
  position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(212,255,0,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(212,255,0,.05) 1px,transparent 1px);
  background-size:40px 40px;
}

.brand{
  display:flex;align-items:center;gap:.6rem;
  font-family:'Space Mono',monospace;font-size:var(--small-size);
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--text-light);
  position:relative;z-index:1;
}
.brand-dot{width:.6rem;height:.6rem;border-radius:50%;background:var(--accent-neon);box-shadow:0 0 14px var(--accent-neon)}
.logo-img{width:clamp(28px,3vw,40px);height:auto;filter:brightness(0) invert(1)}

.kicker{
  font-family:'Space Mono',monospace;font-size:var(--small-size);
  letter-spacing:.32em;text-transform:uppercase;opacity:.85;
  position:relative;z-index:1;
  display:inline-flex;align-items:center;gap:.6rem;
}
.kicker .bar{width:2.4rem;height:1px;background:rgba(255,255,255,.6)}

.title{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(2.4rem,7vw,5.6rem);
  line-height:.92;letter-spacing:-.025em;
  color:var(--text-light);
  position:relative;z-index:1;
  margin-top:auto;
}
.title em{
  font-style:italic;font-weight:700;
  color:var(--accent-neon);
  text-shadow:0 0 24px rgba(212,255,0,.35);
}

.subtitle{
  font-family:'Space Mono',monospace;font-size:var(--body-size);
  line-height:1.5;max-width:36ch;opacity:.92;
  position:relative;z-index:1;margin-top:1rem;
}

.badge{
  display:inline-flex;align-items:center;gap:.5rem;
  background:var(--accent-neon);color:var(--ink);
  padding:.55rem .9rem;border-radius:999px;
  font-family:'Space Mono',monospace;font-size:var(--small-size);
  font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  align-self:flex-start;position:relative;z-index:1;
}

/* Right panel: stat / preview */
.demo-card{
  position:relative;z-index:1;
  border:1px solid rgba(212,255,0,.35);
  border-radius:14px;padding:1.25rem 1.4rem;
  background:rgba(212,255,0,.04);
  backdrop-filter:blur(6px);
  margin-top:auto;
}
.demo-label{
  font-family:'Space Mono',monospace;font-size:var(--small-size);
  color:var(--accent-neon);letter-spacing:.18em;text-transform:uppercase;
  margin-bottom:.6rem;
}
.demo-quote{
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:clamp(1.05rem,1.9vw,1.5rem);line-height:1.2;
  color:var(--text-light);
}
.demo-trans{
  font-family:'Space Mono',monospace;font-size:var(--body-size);
  color:rgba(255,255,255,.75);margin-top:.55rem;
}
.demo-real{
  font-family:'Syne',sans-serif;font-style:italic;font-weight:600;
  font-size:var(--body-size);color:var(--accent-neon);
  margin-top:.7rem;line-height:1.45;
}
.meta{
  position:relative;z-index:1;
  display:flex;align-items:center;justify-content:space-between;
  font-family:'Space Mono',monospace;font-size:var(--small-size);
  opacity:.75;letter-spacing:.12em;
}

/* === ENTRANCE ANIMATION === */
@keyframes rise{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.reveal{opacity:0;animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards}
.d1{animation-delay:.05s}.d2{animation-delay:.18s}.d3{animation-delay:.32s}
.d4{animation-delay:.46s}.d5{animation-delay:.6s}.d6{animation-delay:.74s}

/* Narrow viewport: stack */
@media (max-width:780px){
  .slide{grid-template-columns:1fr;grid-template-rows:60% 40%}
}
</style>
</head>
<body>
<section class="slide">
  <!-- LEFT: BLUE PANEL -->
  <div class="panel-left">
    <div class="brand reveal d1">
      <span class="brand-dot"></span>
      <span>속마음 번역기 · 2026</span>
    </div>

    <div>
      <div class="kicker reveal d2"><span class="bar"></span>HACKERTHON · GYEONGSANG · AI</div>
      <h1 class="title reveal d3">말로 못한<br/><em>마음을 옮기다</em></h1>
      <p class="subtitle reveal d4">사투리 ↔ 표준어 번역에 “속마음”과 “감정”을 더한 한국어 NLP 데모. Gemini 2.5 Flash로 1초 안에 해석합니다.</p>
    </div>

    <span class="badge reveal d5">▶ Live demo · Pitch deck</span>
  </div>

  <!-- RIGHT: DARK PANEL -->
  <div class="panel-right">
    <div class="grid-overlay"></div>

    <div class="brand reveal d2">
      <span>STYLE A</span>
      <span style="opacity:.5">·</span>
      <span>CREATIVE VOLTAGE</span>
    </div>

    <div class="demo-card reveal d5">
      <div class="demo-label">api/translate · response</div>
      <div class="demo-quote">“밥은 묵었나?”</div>
      <div class="demo-trans">→ 밥 먹었어?</div>
      <div class="demo-real">속마음 — 잘 지내는지 걱정돼서, 보고 싶다는 뜻이야.</div>
    </div>

    <div class="meta reveal d6">
      <span>NEXT.JS · GEMINI · POSTGRES</span>
      <span>01 / 12</span>
    </div>
  </div>
</section>
</body>
</html>
